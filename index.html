<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>URL Shortener</h1>
      <p>Create short, memorable links in seconds</p>
    </header>

    <div class="card">
      <form id="shorten-form">
        <div class="form-group">
          <label for="long-url">Long URL</label>
          <input 
            type="url" 
            id="long-url" 
            name="long" 
            placeholder="https://example.com/very/long/url" 
            required
          >
        </div>

        <div class="form-group">
          <label for="alias">
            Custom Alias <span class="hint">(optional)</span>
          </label>
          <input 
            type="text" 
            id="alias" 
            name="alias" 
            placeholder="my-custom-link"
          >
        </div>

        <div class="form-group">
          <label for="expiry">
            Expiry Date <span class="hint">(optional)</span>
          </label>
          <input 
            type="date" 
            id="expiry" 
            name="expiry"
          >
        </div>

        <button type="submit" id="submit-btn">Shorten URL</button>
      </form>

      <div class="error" id="error-msg"></div>

      <div class="result" id="result">
        <div class="result-label">Your shortened URL</div>
        <div class="result-url-container">
          <div class="result-url" id="short-url"></div>
          <div class="result-actions">
            <button type="button" class="btn-icon" id="copy-btn" title="Copy to clipboard">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
            <a href="#" class="btn-icon" id="open-btn" target="_blank" title="Open in new tab">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                <polyline points="15 3 21 3 21 9"></polyline>
                <line x1="10" y1="14" x2="21" y2="3"></line>
              </svg>
            </a>
          </div>
        </div>
        <div class="copy-success" id="copy-success">Copied to clipboard!</div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('shorten-form');
    const submitBtn = document.getElementById('submit-btn');
    const resultDiv = document.getElementById('result');
    const shortUrlDiv = document.getElementById('short-url');
    const errorDiv = document.getElementById('error-msg');
    const copyBtn = document.getElementById('copy-btn');
    const openBtn = document.getElementById('open-btn');
    const copySuccess = document.getElementById('copy-success');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Reset UI
      resultDiv.classList.remove('show');
      errorDiv.classList.remove('show');
      copySuccess.classList.remove('show');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Shortening...';

      const formData = new URLSearchParams();
      formData.append('long', document.getElementById('long-url').value);
      
      const alias = document.getElementById('alias').value;
      const expiry = document.getElementById('expiry').value;
      
      if (alias) formData.append('alias', alias);
      if (expiry) formData.append('expiry', expiry);

      try {
        const response = await fetch('/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData.toString()
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Failed to shorten URL');
        }

        shortUrlDiv.textContent = data.shortUrl;
        openBtn.href = data.shortUrl;
        resultDiv.classList.add('show');
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Shorten URL';
      }
    });

    copyBtn.addEventListener('click', async () => {
      const url = shortUrlDiv.textContent;
      try {
        await navigator.clipboard.writeText(url);
        copySuccess.classList.add('show');
        setTimeout(() => copySuccess.classList.remove('show'), 2000);
      } catch (err) {
        alert('Failed to copy to clipboard');
      }
    });
  </script>
</body>
</html>
