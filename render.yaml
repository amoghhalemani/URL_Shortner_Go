services:
  - type: web
    name: url-shortener
    runtime: docker
    plan: free
    envVars:
      - key: DB_URL
        fromDatabase:
          name: url-shortener-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: SENTRY_DSN
        sync: false

databases:
  - name: url-shortener-db
    plan: free